{% extends "base.html" %}

{% block title %}Create Post — Simple Blog{% endblock %}

{% block content %}

<!-- Page Header -->
<div class="page-header">
    <h1>Create New Post</h1>
    <p class="subtitle">Share something worth reading.</p>
</div>

<!-- Create Post Form -->
<div class="form-card">
    <form method="POST" action="{{ url_for('create') }}">

        <!-- Title Field -->
        <div class="form-group">
            <label for="title">Post Title</label>
            <input
                type="text"
                id="title"
                name="title"
                placeholder="Enter a compelling title..."
                required
            />
        </div>

        <!-- Content Field -->
        <div class="form-group">
            <label for="content">Post Content</label>
            <textarea
                id="content"
                name="content"
                rows="8"
                placeholder="Write your post content here..."
                required
            ></textarea>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">&#10003; Publish Post</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">&#8592; Cancel</a>
        </div>

    </form>
</div>

{% endblock %}
