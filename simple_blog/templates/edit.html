{% extends "base.html" %}

{% block title %}Edit Post — Simple Blog{% endblock %}

{% block content %}

<!-- Page Header -->
<div class="page-header">
    <h1>Edit Post</h1>
    <p class="subtitle">Update your post below and save the changes.</p>
</div>

<!-- Edit Post Form — pre-filled with existing post data -->
<div class="form-card">
    <form method="POST" action="{{ url_for('edit', post_id=post.id) }}">

        <!-- Title Field (pre-filled) -->
        <div class="form-group">
            <label for="title">Post Title</label>
            <input
                type="text"
                id="title"
                name="title"
                value="{{ post.title }}"
                required
            />
        </div>

        <!-- Content Field (pre-filled) -->
        <div class="form-group">
            <label for="content">Post Content</label>
            <textarea
                id="content"
                name="content"
                rows="8"
                required
            >{{ post.content }}</textarea>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">&#10003; Save Changes</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">&#8592; Cancel</a>
        </div>

    </form>
</div>

{% endblock %}
